<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Omega Drill - Profesjonalne Usługi Geotechniczne | Mikropale</title>
  <meta name="description"
    content="Omega Drill Sp. z o.o. - Eksperci w dziedzinie geotechniki. Roboty mikropalowe, wzmacnianie podłoża i projektowanie. Działamy 24/7 na terenie całej Polski.">

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
